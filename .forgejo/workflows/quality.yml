name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: native
    outputs:
      quality: ${{ steps.filter.outputs.quality }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            quality:
              - "**/*.nix"
              - "flake.lock"
              - "flake.nix"
              - "justfile"
              - "dots/**"
              - "scripts/**"
              - ".forgejo/workflows/**"

  flake-check:
    name: Flake Check
    runs-on: native
    needs: changes
    if: ${{ needs.changes.outputs.quality == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - run: nix flake check

  nix-format:
    name: Nix Format Check
    runs-on: native
    needs: changes
    if: ${{ needs.changes.outputs.quality == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - run: nix fmt -- --ci
