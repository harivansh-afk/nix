name: Redirect PRs to Forgejo

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const forgejo = "https://git.harivan.sh/harivansh-afk/nix";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `Thanks for the contribution. This repository is a read-only mirror; the canonical source lives on Forgejo.\n\nPlease re-open this pull request at ${forgejo}.`,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
