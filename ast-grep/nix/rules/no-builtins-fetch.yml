id: no-builtins-fetch
language: nix
severity: error
message: "builtins.fetch* runs on eval, is not a fixed-output derivation, and does not substitute. Use the matching pkgs.* fetcher (pkgs.fetchurl, pkgs.fetchzip, pkgs.fetchFromGitHub, pkgs.fetchgit, ...) at point of use."
note: |
  WHY: builtins.fetchurl / fetchTarball / fetchGit / fetchTree fetch at evaluation
  time. They are not derivations, they cannot be substituted from a binary cache,
  and they re-fetch on every eval unless the path is already in /nix/store. The
  pkgs.* fetchers wrap the same fetch as a (typically fixed-output) derivation:
  the fetch happens at build time, the content hash is part of the store path, and
  substituters can short-circuit the download entirely.
  NIXPKGS: Yes. Nixpkgs forbids builtins fetchers in package expressions. The
  available pkgs.* fetchers cover every common source type (fetchurl, fetchzip,
  fetchFromGitHub, fetchFromGitLab, fetchFromForgejo, fetchgit, fetchMavenArtifact,
  fetchNpmDeps, fetchCrate, ...).
  REPO: Pick the most specific pkgs.* fetcher for the source
  and put the URL/ref + SRI hash next to the catalog entry.
rule:
  any:
    - pattern: builtins.fetchurl
    - pattern: builtins.fetchTarball
    - pattern: builtins.fetchGit
    - pattern: builtins.fetchTree
