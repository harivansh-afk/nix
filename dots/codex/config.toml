model = "gpt-5.6-sol"
model_reasoning_effort = "high"
personality = "pragmatic"
suppress_unstable_features_warning = true
web_search = "live"
plan_mode_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"
service_tier = "fast"

# Only non-default feature toggles are listed. Stable defaults (shell_tool,
# unified_exec, shell_snapshot, personality, hooks, goals, guardian_approval,
# fast_mode, enable_request_compression, skill_mcp_dependency_install) are
# already on and were dropped. Removed/dead no-op keys were dropped too:
# apply_patch_freeform, skill_env_var_dependency_prompt, codex_git_commit,
# plugin_hooks, external_migration, remote_control, child_agents_md, and the
# top-level commit_attribution (attribution now lives in an extension).
[features]
# Opt-out from a stable on-by-default feature.
apps = false

# Experimental (also exposed in /experimental).
memories = true
prevent_idle_sleep = true

# Under development; off by default. The warning banner is silenced via
# suppress_unstable_features_warning above.
code_mode = true
code_mode_only = true
apply_patch_streaming_events = true
runtime_metrics = true
exec_permission_approvals = true
request_permissions_tool = true
enable_fanout = true
default_mode_request_user_input = true
chronicle = true
realtime_conversation = true
artifact = true

# multi_agent_v2 encrypts the spawn_agent/send_message/followup_task `message`
# params unconditionally (codex #26210). Keep multi-agent v1 via enable_fanout
# until encrypted tool use is verified with the configured model.
[features.multi_agent_v2]
enabled = false
max_concurrent_threads_per_session = 8

[agents]
max_depth = 3
job_max_runtime_seconds = 1800

[agents.worker]
description = "Implementation-focused role for scoped coding tasks."

[agents.reviewer]
description = "Review-focused role that prioritizes bugs, regressions, and missing tests."

[memories]
max_raw_memories_for_consolidation = 512
max_rollout_age_days = 30
max_rollouts_per_startup = 2
min_rollout_idle_hours = 24

[mcp_servers.mgrep]
command = "mgrep"
args = ["mcp"]

[sandbox_workspace_write]
network_access = true

[projects."/home/rathi/Documents/Git/indexable/ix"]
trust_level = "trusted"

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

[tui]
status_line = ["model-name", "git-branch", "context-remaining"]
