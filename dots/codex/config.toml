model = "gpt-5.6-sol"
model_verbosity = "low"
model_reasoning_effort = "medium"
personality = "pragmatic"
suppress_unstable_features_warning = true
web_search = "live"
plan_mode_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
service_tier = "priority"

# Only non-default feature toggles are listed. Stable defaults stay implicit so
# this file follows upstream as features graduate.
[features]
# Opt-out from a stable on-by-default feature.
apps = false

# Stable opt-in.
memories = true

# Experimental (also exposed in /experimental).
prevent_idle_sleep = true

# Under development; off by default. The warning banner is silenced via
# suppress_unstable_features_warning above.
code_mode = true
code_mode_only = true
apply_patch_streaming_events = true
runtime_metrics = true
exec_permission_approvals = true
request_permissions_tool = true
enable_fanout = true
default_mode_request_user_input = true
chronicle = true
realtime_conversation = true
artifact = true

# Encrypted v2 delegation is supported by gpt-5.6-sol.
[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 8

[agents]
max_depth = 3
job_max_runtime_seconds = 1800

[agents.worker]
description = "Implementation-focused role for scoped coding tasks."

[agents.reviewer]
description = "Review-focused role that prioritizes bugs, regressions, and missing tests."

[memories]
max_raw_memories_for_consolidation = 512
max_rollout_age_days = 30
max_rollouts_per_startup = 2
min_rollout_idle_hours = 24

[history]
max_bytes = 52428800

[projects."/home/rathi/Documents/Git/indexable/ix"]
trust_level = "trusted"

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

[tui]
status_line = ["model-with-reasoning", "git-branch", "task-progress", "context-remaining"]
